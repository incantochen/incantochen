<title>專有名詞對照 — incantochen</title>
<style>
  :root {
    --ground:#F1F3F0; --surface:#FBFCFA; --surface-2:#F4F6F2;
    --ink:#171A18; --muted:#5B615C; --faint:#858B85;
    --hairline:#E0E3DD; --hairline-strong:#CFD4CC;
    --accent:#0B6E63; --accent-soft:#0B6E6314; --accent-ink:#095A51;
    --warn:#9A5E08; --good:#1B7343; --danger:#AA342D;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(20,28,24,.05), 0 6px 20px -12px rgba(20,28,24,.18);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --serif:ui-serif,"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#0F1312; --surface:#161A19; --surface-2:#1B201E;
    --ink:#E7EAE6; --muted:#9AA19B; --faint:#757C76;
    --hairline:#262C29; --hairline-strong:#333A36;
    --accent:#45C3B1; --accent-soft:#45C3B11f; --accent-ink:#6fd3c4;
    --warn:#E0B267; --good:#6FCB92; --danger:#E8938C;
  }}
  :root[data-theme="light"]{
    --ground:#F1F3F0; --surface:#FBFCFA; --surface-2:#F4F6F2;
    --ink:#171A18; --muted:#5B615C; --faint:#858B85;
    --hairline:#E0E3DD; --hairline-strong:#CFD4CC;
    --accent:#0B6E63; --accent-soft:#0B6E6314; --accent-ink:#095A51;
    --warn:#9A5E08; --good:#1B7343; --danger:#AA342D;
  }
  :root[data-theme="dark"]{
    --ground:#0F1312; --surface:#161A19; --surface-2:#1B201E;
    --ink:#E7EAE6; --muted:#9AA19B; --faint:#757C76;
    --hairline:#262C29; --hairline-strong:#333A36;
    --accent:#45C3B1; --accent-soft:#45C3B11f; --accent-ink:#6fd3c4;
    --warn:#E0B267; --good:#6FCB92; --danger:#E8938C;
  }

  *{box-sizing:border-box;}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1000px;margin:0 auto;padding:clamp(28px,5vw,60px) clamp(18px,4vw,44px) 96px;}

  header{border-bottom:1px solid var(--hairline);padding-bottom:26px;margin-bottom:26px;}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--accent);display:inline-block;}
  h1{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;font-size:clamp(28px,5vw,42px);line-height:1.1;margin:0 0 12px;text-wrap:balance;}
  .lede{color:var(--muted);font-size:15px;max-width:60ch;margin:0;}

  /* controls */
  .controls{position:sticky;top:0;z-index:10;background:var(--ground);padding:16px 0 14px;margin-bottom:8px;border-bottom:1px solid var(--hairline);}
  .search{position:relative;margin-bottom:12px;}
  .search input{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--surface);border:1px solid var(--hairline-strong);border-radius:var(--radius);padding:12px 42px 12px 42px;outline:none;transition:border-color .15s,box-shadow .15s;}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .search .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px;pointer-events:none;}
  .search .clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:var(--faint);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;border-radius:6px;display:none;}
  .search .clear:hover{color:var(--ink);background:var(--surface-2);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{font-family:var(--mono);font-size:11.5px;padding:5px 12px;border-radius:100px;border:1px solid var(--hairline-strong);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .14s;white-space:nowrap;}
  .chip:hover{border-color:var(--accent);color:var(--accent-ink);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  :root[data-theme="dark"] .chip.active,@media (prefers-color-scheme:dark){.chip.active{color:#0F1312;}}
  .count{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:12px;}

  /* sections */
  section{margin-top:40px;scroll-margin-top:150px;}
  section.hidden{display:none;}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;}
  .sec-num{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.1em;}
  h2{font-family:var(--serif);font-weight:600;font-size:clamp(18px,3vw,23px);margin:0;letter-spacing:-.01em;}

  .terms{display:flex;flex-direction:column;gap:1px;background:var(--hairline);border:1px solid var(--hairline);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .term{display:grid;grid-template-columns:150px 1fr;gap:18px;padding:14px 18px;background:var(--surface);align-items:baseline;}
  .term.hidden{display:none;}
  .term .head{display:flex;flex-direction:column;gap:2px;}
  .term .abbr{font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--accent-ink);letter-spacing:-.01em;word-break:break-word;}
  .term .full{font-size:11.5px;color:var(--faint);font-family:var(--mono);}
  .term .desc{font-size:13.5px;color:var(--ink);}
  .term .desc code{font-family:var(--mono);font-size:12px;background:var(--surface-2);border:1px solid var(--hairline);border-radius:4px;padding:1px 5px;color:var(--accent-ink);}
  mark{background:var(--accent-soft);color:var(--accent-ink);border-radius:3px;padding:0 1px;font-weight:600;}
  @media (max-width:600px){.term{grid-template-columns:1fr;gap:5px;}}

  .empty{display:none;text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}
  .empty.show{display:block;}
  .empty code{font-family:var(--mono);color:var(--accent-ink);}

  footer{margin-top:56px;padding-top:22px;border-top:1px solid var(--hairline);font-family:var(--mono);font-size:11.5px;color:var(--faint);display:flex;flex-wrap:wrap;gap:6px 20px;}

  @media (prefers-reduced-motion:no-preference){.chip,.search input{transition-duration:.14s;}}
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">incantochen · 開發詞彙</div>
    <h1>專有名詞縮寫對照</h1>
    <p class="lede">本專案文件與程式碼常見的縮寫與術語，白話對照。輸入關鍵字即時篩選，或點分類標籤跳看。</p>
  </header>

  <div class="controls">
    <div class="search">
      <span class="ico">⌕</span>
      <input id="q" type="search" placeholder="搜尋縮寫、全稱或說明⋯（例：CAS、原子、綠界）" autocomplete="off" aria-label="搜尋詞彙">
      <button class="clear" id="clear" aria-label="清除">×</button>
    </div>
    <div class="chips" id="chips">
      <button class="chip active" data-cat="all">全部</button>
      <button class="chip" data-cat="flow">開發流程</button>
      <button class="chip" data-cat="db">資料庫後端</button>
      <button class="chip" data-cat="pay">金流 ECPay</button>
      <button class="chip" data-cat="sec">安全身份</button>
      <button class="chip" data-cat="ux">前端 UX</button>
      <button class="chip" data-cat="proj">本專案概念</button>
      <button class="chip" data-cat="svc">第三方服務</button>
    </div>
    <div class="count" id="count"></div>
  </div>

  <div id="list">
    <!-- sections rendered by JS -->
  </div>

  <div class="empty" id="empty">找不到符合「<code id="emptyq"></code>」的詞彙，換個關鍵字試試。</div>

  <footer>
    <span>incantochen · 高端半客製彩色寶石電商</span>
    <span>對照以程式碼與 docs/ 為準，過時即修</span>
  </footer>
</div>

<script>
const DATA = [
  {cat:'flow', title:'開發流程與工具', num:'01', items:[
    ['PR','Pull Request','把 feature branch 的改動提出來請人審查、合併進主線的請求。'],
    ['CI','Continuous Integration','持續整合。每次 push 自動跑 lint／型別／測試／build，把壞掉的改動擋在合併前。'],
    ['CD','Continuous Deployment/Delivery','持續部署。通過 CI 後自動部署（Vercel preview＝staging、master＝production）。'],
    ['CI/CD','—','上述兩者合稱，指「自動化的測試＋部署管線」。'],
    ['MVP','Minimum Viable Product','最小可行產品。先做能跑通核心閉環的最小範圍，其餘留後續。'],
    ['E2E','End-to-End','端到端測試。模擬真實使用者從頭到尾走完一條流程（如下單→付款）。'],
    ['RWD','Responsive Web Design','響應式設計。同一頁面在手機／平板／桌機自動調整版面。'],
    ['SEO','Search Engine Optimization','搜尋引擎最佳化，讓 Google 更容易收錄與排名。'],
    ['CRUD','Create/Read/Update/Delete','資料的新增／讀取／更新／刪除，泛指後台管理功能。'],
    ['CSV','Comma-Separated Values','逗號分隔的純文字表格（如 <code>tasks.csv</code>）。'],
    ['MCP','Model Context Protocol','讓 AI 代理連接外部工具／資料源的協定。'],
    ['SDK','Software Development Kit','第三方提供的程式庫（如 Supabase SDK、Resend SDK）。'],
    ['TS','TypeScript','本專案的程式語言（<code>.ts</code>／<code>.tsx</code>）；「TS 端」指應用程式碼，對照「DB 端」的 SQL 函式。'],
  ]},
  {cat:'db', title:'資料庫與後端', num:'02', items:[
    ['RLS','Row Level Security','資料列級權限。Postgres 依規則決定哪一列誰能讀寫；本專案 deny-by-default（預設全拒）。'],
    ['RPC','Remote Procedure Call','呼叫資料庫端函式的<b>機制</b>（如 <code>transition_order_status</code>）。RPC 本身不等於原子交易——把多段寫入包進同一個 DB function（＝同一交易單元），那次 RPC 才具原子性（要嘛全成功、要嘛全 rollback）。'],
    ['FK','Foreign Key','外鍵。一張表指向另一張表的關聯欄位（帳務鏈用 RESTRICT、設定圖用 CASCADE）。'],
    ['enum','Enumerated type','列舉型別。欄位只能取固定幾個值之一（如訂單 status）。'],
    ['CAS','Compare-And-Swap（比較並交換）','條件式更新：<code>UPDATE ... WHERE status=\'舊值\'</code>，只有值仍相符才更新，用來防並發雙寫。'],
    ['TOCTOU','Time-Of-Check to Time-Of-Use','檢查到使用之間的時間差。查完到寫入前狀態被別人改掉的競態窄窗。'],
    ['EvalPlanQual','—','Postgres 在 READ COMMITTED 下，更新撞到並發修改時「重新評估條件再試」的機制；<code>from=to</code> 守衛就是防它導致 CAS 失效。'],
    ['READ COMMITTED','—','Postgres 預設交易隔離級別；每個語句只看到已提交的資料（並發防護要據此設計）。'],
    ['PostgREST','—','Supabase 把資料表自動變成 REST API 的引擎；numeric 回字串、<code>.or()</code> 需雙引號包 timestamp 等陷阱源自它。'],
    ['PII','Personally Identifiable Information','個人可識別資訊（姓名、電話、地址、email）；存取有稽核（<code>pii_access_log</code>）。'],
    ['Idempotent','冪等','同一操作重複執行結果一致、不重複扣款/重複記帳（金流兜底的核心性質）。'],
    ['Service role','—','Supabase 的最高權限金鑰，繞過 RLS；只在伺服器端用（<code>import "server-only"</code> 防呆）。'],
    ['Cron','—','排程任務（定時執行），如每日對帳、逾期取消、購物車清理。'],
    ['Serverless','—','無伺服器函式；用完即凍結，故禁 fire-and-forget，一律 <code>await</code>。'],
  ]},
  {cat:'pay', title:'金流與 ECPay（綠界）', num:'03', items:[
    ['ECPay','綠界科技','本專案的金流／電子發票／物流服務商。'],
    ['AIO','All In One','綠界的整合式金流介面（目前信用卡走的導轉式收銀台）。'],
    ['ECPG','EC Payment Gateway','綠界站內付 2.0；規劃取代 AIO 導轉式信用卡（T103，MVP 後才做）。'],
    ['Webhook','—','綠界付款後主動 POST 到本站 <code>/api/ecpay/notify</code> 的背景通知，是付款判定的<b>權威來源</b>。'],
    ['CheckMacValue','—','綠界回拋的驗章值，防竄改（金流用 SHA256、物流用 MD5，不可混用）。'],
    ['MerchantTradeNo','—','送給綠界的交易編號（19 碼，由 order_no 重組，單一出處 <code>merchant-trade-no.ts</code>）。'],
    ['TradeNo / gateway_trade_no','—','綠界端的交易號，退刷／對帳比對用。'],
    ['TradeStatus','—','綠界回報的交易狀態碼（<code>1</code>＝已付款、<code>0</code>＝未付、<code>10200095</code>＝失敗）。'],
    ['3DS','3D Secure','信用卡付款時的持卡人身份驗證機制。'],
    ['RMA','Return Merchandise Authorization','退貨授權流程；售後狀態設計參考此概念（尚未完整定案）。'],
    ['對帳三臂','—','每日 reconcile cron 的三條救援：主臂（打綠界）/漂移臂（信任財務事實）/稽核臂（只偵測）。'],
  ]},
  {cat:'sec', title:'安全與身份', num:'04', items:[
    ['OTP','One-Time Password','一次性驗證碼；登入主推 email OTP（碼長不固定，4–10 位彈性）。'],
    ['Magic link','—','免密碼登入連結（輔助方式）；落地頁需再按一次才消耗 token，防掃描器誤點。'],
    ['guest_token','—','訪客身份 httpOnly cookie（30 天 rolling），關聯訪客購物車、驗擁有權。'],
    ['Session','—','登入後的會話狀態（落在輸碼/點擊的當下裝置）。'],
    ['CSP','Content Security Policy','內容安全政策，限制頁面能載入的資源；由 <code>proxy.ts</code> 每請求動態產生（nonce＋strict-dynamic）。'],
    ['nonce','—','一次性隨機字串；CSP 用它標記「這段 script 是我發的」，防 XSS 注入。'],
    ['HSTS','HTTP Strict Transport Security','強制瀏覽器只用 HTTPS 連線的標頭。'],
    ['XFF','X-Forwarded-For','代理層帶的來源 IP 標頭；取用有 fallback（<code>get-client-ip.ts</code>），非 Vercel 環境可偽造。'],
    ['SPF/DKIM/DMARC','—','三種 email 寄件網域驗證機制，決定信會不會進垃圾桶（上線 T50 要設）。'],
    ['deny-by-default','—','「預設全拒」：權限白名單制，沒明確允許就一律禁止。'],
  ]},
  {cat:'ux', title:'前端與 UX', num:'05', items:[
    ['PDP','Product Detail Page','商品詳情頁（<code>/products/[slug]</code>），配置器內嵌於此。'],
    ['IA','Information Architecture','資訊架構：網站地圖、導覽、URL 結構。'],
    ['OG','Open Graph','社群分享時顯示的預覽圖／標題卡（OG image）。'],
    ['TSX','TypeScript + JSX','React 元件檔的副檔名（<code>.tsx</code>）。'],
    ['ISR','Incremental Static Regeneration','靜態頁面增量再生（Next.js 快取策略之一）。'],
    ['PPR','Partial Prerendering','局部預渲染（Next.js 16 Cache Components 的機制）。'],
    ['swatch','—','色票；配置器裡選寶石色／金屬色的小色塊（T120）。'],
    ['stepper','—','加減數量的「−/＋」控制元件。'],
  ]},
  {cat:'proj', title:'本專案自訂概念', num:'06', items:[
    ['快照 snapshot','—','下單當下把價格／規格釘死存進 <code>unit_price_snapshot</code>／<code>config_snapshot</code>，日後調價不影響已成立訂單。'],
    ['驗價 verify-prices','—','結帳時伺服器依 DB 白名單重算金額，絕不信任前端傳來的價格（紅線）。'],
    ['白名單三層','—','配置器可選值的控制：類別 <code>applies_to</code>→款式 <code>ProductOption</code>→值 <code>ProductOptionValue</code>。'],
    ['PAID_LINEAGE','—','付款成立契約集合＝paid/in_production/shipped/completed；決定哪些狀態該補寄確認信。'],
    ['狀態機','—','訂單狀態的合法轉換規則（<code>VALID_TRANSITIONS</code>）。'],
    ['主臂／漂移臂／稽核臂','—','對帳 cron 的三條救援臂。'],
    ['webhook 側卡單','—','payment 已 paid 但訂單卡 pending_payment 的漂移態（漂移臂負責救）。'],
    ['fail-visible','—','子任務失敗時讓整支 cron 回 HTTP 500，讓監控看到紅燈，而非靜默當綠燈。'],
    ['sweep','—','每日掃描補救（失敗通知補寄、未開票補開）的清掃動作。'],
    ['sendOnce','—','關鍵信件去重寄送機制（<code>notification unique(order_id,type)</code>），防重複寄。'],
    ['Admin Override','—','後台繞過狀態機把訂單改任意狀態的逃生口（必填理由、寫稽核 log、不翻 payment/不寄信）。'],
    ['ultra / ultrareview','—','雲端多代理程式審查（<code>/code-review ultra</code>），計費、由使用者本人觸發。'],
  ]},
  {cat:'svc', title:'常用第三方服務', num:'07', items:[
    ['Supabase','—','Postgres 資料庫＋Auth＋Storage（雲端 production）。'],
    ['Vercel','—','部署平台（含 CI、preview＝staging、Cron）。'],
    ['Resend','—','交易信件寄送（訂單確認、通知）。'],
    ['Sentry','—','錯誤／靜默失敗監控與告警。'],
    ['Upstash Redis','—','速率限制（OTP 防濫發、對帳連續 403 計數）。'],
    ['ECPay 綠界','—','金流／電子發票／黑貓宅配物流。'],
  ]},
];

const listEl = document.getElementById('list');
const qEl = document.getElementById('q');
const clearEl = document.getElementById('clear');
const chipsEl = document.getElementById('chips');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
const emptyqEl = document.getElementById('emptyq');

let totalTerms = 0;
// build DOM
DATA.forEach(sec=>{
  const s = document.createElement('section');
  s.dataset.cat = sec.cat;
  s.innerHTML = `<div class="sec-head"><span class="sec-num">${sec.num}</span><h2>${sec.title}</h2></div>`;
  const terms = document.createElement('div');
  terms.className = 'terms';
  sec.items.forEach(([abbr,full,desc])=>{
    totalTerms++;
    const t = document.createElement('div');
    t.className = 'term';
    t.dataset.search = (abbr+' '+full+' '+desc).toLowerCase().replace(/<[^>]+>/g,'');
    t.dataset.abbr = abbr; t.dataset.full = full; t.dataset.desc = desc;
    const fullHtml = full && full!=='—' ? `<span class="full">${full}</span>` : '';
    t.innerHTML = `<div class="head"><span class="abbr">${abbr}</span>${fullHtml}</div><div class="desc">${desc}</div>`;
    terms.appendChild(t);
  });
  s.appendChild(terms);
  listEl.appendChild(s);
});

let activeCat = 'all';

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function hl(term, q){
  const abbrEl = term.querySelector('.abbr');
  const descEl = term.querySelector('.desc');
  const fullEl = term.querySelector('.full');
  const abbr = term.dataset.abbr, full = term.dataset.full, desc = term.dataset.desc;
  if(!q){
    abbrEl.textContent = abbr;
    if(fullEl) fullEl.textContent = full;
    descEl.innerHTML = desc;
    return;
  }
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  abbrEl.innerHTML = esc(abbr).replace(re,'<mark>$1</mark>');
  if(fullEl && full!=='—') fullEl.innerHTML = esc(full).replace(re,'<mark>$1</mark>');
  // desc contains HTML (code tags); highlight only in text nodes by working on raw then re-injecting is complex —
  // simple approach: highlight on the plain rendered text is skipped for desc to avoid breaking <code>. Keep desc as-is.
  descEl.innerHTML = desc;
}

function apply(){
  const q = qEl.value.trim().toLowerCase();
  clearEl.style.display = q ? 'block' : 'none';
  let shown = 0;
  document.querySelectorAll('section').forEach(sec=>{
    const catOk = activeCat==='all' || sec.dataset.cat===activeCat;
    let secShown = 0;
    sec.querySelectorAll('.term').forEach(t=>{
      const match = catOk && (!q || t.dataset.search.includes(q));
      t.classList.toggle('hidden', !match);
      if(match){ secShown++; hl(t,q); }
    });
    sec.classList.toggle('hidden', secShown===0);
    shown += secShown;
  });
  emptyEl.classList.toggle('show', shown===0);
  if(shown===0) emptyqEl.textContent = qEl.value.trim();
  countEl.textContent = q || activeCat!=='all'
    ? `顯示 ${shown} / ${totalTerms} 個詞彙`
    : `共 ${totalTerms} 個詞彙`;
}

qEl.addEventListener('input', apply);
clearEl.addEventListener('click', ()=>{ qEl.value=''; qEl.focus(); apply(); });
chipsEl.addEventListener('click', e=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  activeCat = chip.dataset.cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c===chip));
  apply();
});
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==qEl){ e.preventDefault(); qEl.focus(); }
  if(e.key==='Escape' && document.activeElement===qEl){ qEl.value=''; apply(); qEl.blur(); }
});

apply();
</script>
