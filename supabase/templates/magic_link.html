<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
  </head>
  <body style="font-family: sans-serif; color: #1a1a1a; background: #faf9f6; padding: 32px;">
    <table style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 11px; padding: 32px;">
      <tr>
        <td>
          <p style="font-size: 14px; color: #555;">incantochen 登入驗證</p>

          <p style="font-size: 14px;">請輸入以下驗證碼完成登入：</p>

          <p style="font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #063b2f; margin: 24px 0;">
            {{ .Token }}
          </p>

          <p style="font-size: 13px; color: #777;">驗證碼 60 分鐘內有效，僅可使用一次。</p>

          <p style="font-size: 14px; margin-top: 24px;">或點擊以下連結登入：</p>

          <p style="margin: 12px 0;">
            <a
              href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
              style="color: #c5a059; word-break: break-all;"
            >
              {{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email
            </a>
          </p>

          <p style="font-size: 12px; color: #999; margin-top: 32px;">
            若您未曾要求登入 incantochen，請忽略此信。
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
